<!DOCTYPE html>
<html>
<head>
    <title>Basic Test</title>
    <style>
        body { 
            margin: 0;
            padding: 50px;
            font-family: Arial, sans-serif; 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
        }
        .big-text {
            font-size: 72px;
            font-weight: bold;
            text-align: center;
            margin: 50px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .info {
            font-size: 24px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="big-text">🚀 SERVER IS WORKING! 🚀</div>
    <div class="info">
        <p>If you can see this colorful page, then:</p>
        <ul style="text-align: left; display: inline-block;">
            <li>✅ The server is running correctly</li>
            <li>✅ Your browser can load static content</li>
            <li>✅ The preview window is functional</li>
        </ul>
        <p><strong>Time:</strong> <span id="time"></span></p>
    </div>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
        console.log('✅ JavaScript is working!');
        console.log('If React has issues, check for errors above this message.');
    </script>
</body>
</html>
