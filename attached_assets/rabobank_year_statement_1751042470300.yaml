# -------------------------------------------------------------------------------------------------
# Filename: rabobank_year_statement 
#
# Description:
# This rule identifies and classifies Rabobank Year statements.
# Core identifiers include bank name, document type markers, and IBAN pattern.
# Metadata such as correspondent, type, tags, and custom fields are extracted accordingly.
#
# version: 1.0
# Created: 2025-06-06
# history:
#  - 1.0: Initial rule for Rabobank Year Statement created with core and bonus identifiers, 
#         metadata extraction, and POCO scoring weights.
# -------------------------------------------------------------------------------------------------
#
rule_name: "Rabobank Year Statement (Check Account)"
rule_id: "rabobank_year_statement"
threshold: 70  # Minimum score for being accepted for further processing

core_identifiers:
  logic_groups:
    - type: "match"
      score: 30
      conditions:
        - pattern: "Rabobank"
          source: "content"
          range: "0-600"

    - type: "match"
      score: 30
      conditions:
        - pattern: "Jaaroverzicht (\\d{4})"
          source: "content"
          range: "0-600"

    - type: "match"
      score: 20
      conditions:
        - pattern: "TotaalRekening"
          source: "content"
          range: "0-600"

    - type: "match"
      score: 20
      conditions:
        - pattern: "NL74 ?RABO[0-9 ]{7}592"
          source: "content"
          range: "0-600"

bonus_identifiers:
  logic_groups:
    - type: "match"
      score: 10
      conditions:
        - pattern: "belastingaangifte"
          source: "content"
          range: "0-600"

    - type: "match"
      score: 10
      conditions:
        - pattern: "Financieel Jaaroverzicht"
          source: "content"
          range: "0-600"

    - type: "match"
      score: 10
      conditions:
        - pattern: "NL74 ?RABO[0-9 ]{7}369"
          source: "content"
          range: "0-600"
          add_tag: "Savings Account"

    - type: "match"
      score: 10
      conditions:
        - pattern: "Creditcards"
          source: "content"
          range: "0-600"
          add_tag: "Credit Card"

    - type: "match"
      score: 10
      conditions:
        - pattern: "Rabo Goldcard Visa \\*\\*\\*\\*.\\*\\*\\*\\*.\\*\\*\\*\\*.3722"
          source: "content"
          range: "0-600"
          add_tag: "Credit Card"

# Extracting date from statement to determine Date Created:
content_extractors:
  date_created:
    pattern_after: "Datum\\s*(\\d{2}-\\d{2}-\\d{4})"
    format: "%d-%m-%Y"
  extracted_tags:
    - pattern: "Jaaroverzicht (\\d{4})"
      prefix: "FY"

# Setting known metadata based on static document caracteristics
metadata:
  correspondent: "Rabobank"
  document_type: "Year Statement"
  tags: ["Check Account"]
  custom_fields:
    Document Category: "FINANCE"

filename_patterns:
  - pattern: "(\\d{4}-\\d{2}-\\d{2})_NL89RABO\\d+592-EUR_Financieel_Jaaroverzicht_(\\d{4})"
    date_group: 1

# Setting the weight of the metadata extracted fron filename and Paperless metadata
poco_weights:
  filename: 5
  paperless: 3