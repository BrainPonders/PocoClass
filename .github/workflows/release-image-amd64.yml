name: Release Docker Image (amd64)

on:
  push:
    tags:
      - 'v*.*.*-dev.*-amd64'
      - 'v*.*.*-rc.*-amd64'
      - 'v*.*.*-amd64'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Base tag without -amd64 (e.g. v2.0.0-dev.1, v2.0.0-rc.1, v2.0.0)
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-amd64-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push-amd64:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image_name=ghcr.io/${owner_lc}/pococlass" >> "$GITHUB_OUTPUT"

      - name: Resolve and validate release tag
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            base_tag="${{ inputs.release_tag }}"
          else
            raw_tag="${GITHUB_REF_NAME}"
            if [[ "$raw_tag" != *-amd64 ]]; then
              echo "Invalid amd64 tag: $raw_tag"
              echo "Expected suffix: -amd64"
              exit 1
            fi
            base_tag="${raw_tag%-amd64}"
          fi

          if [[ "$base_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$ ]]; then
            channel="dev"
          elif [[ "$base_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            channel="rc"
          elif [[ "$base_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            channel="final"
          else
            echo "Invalid base release tag: $base_tag"
            echo "Allowed: v<major>.<minor>.<patch>-dev.<n> | v<major>.<minor>.<patch>-rc.<n> | v<major>.<minor>.<patch>"
            exit 1
          fi

          source_tag="${base_tag}-amd64"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "base_tag=$base_tag" >> "$GITHUB_OUTPUT"
          echo "source_tag=$source_tag" >> "$GITHUB_OUTPUT"

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          image_name="${{ steps.image.outputs.image_name }}"
          build_number="$(git rev-list --count HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          source_tag="${{ steps.validate.outputs.source_tag }}"

          {
            echo "build_number=$build_number"
            echo "short_sha=$short_sha"
            echo "source_tag=$source_tag"
            echo "tags<<EOF"
            echo "${image_name}:${source_tag}"
            echo "${image_name}:build-${build_number}-amd64"
            echo "${image_name}:sha-${short_sha}-amd64"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: distribution/docker-build/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_NUMBER=${{ steps.meta.outputs.build_number }}
            VERSION=${{ steps.validate.outputs.base_tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.validate.outputs.base_tag }}
            org.opencontainers.image.title=PocoClass
            org.opencontainers.image.description=PocoClass Docker image (amd64)

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Release image published (amd64)"
            echo ""
            echo "- Channel: ${{ steps.validate.outputs.channel }}"
            echo "- Base tag: \`${{ steps.validate.outputs.base_tag }}\`"
            echo "- Source tag: \`${{ steps.meta.outputs.source_tag }}\`"
            echo "- Build number: \`${{ steps.meta.outputs.build_number }}\`"
            echo "- Commit: \`${{ steps.meta.outputs.short_sha }}\`"
            echo ""
            echo "### Image tags"
            echo ""
            while IFS= read -r tag; do
              echo "- \`${tag}\`"
            done <<< "${{ steps.meta.outputs.tags }}"
          } >> "$GITHUB_STEP_SUMMARY"
