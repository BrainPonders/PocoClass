name: Release Docker Image

on:
  push:
    tags:
      - 'v*.*.*-dev.*'
      - 'v*.*.*-rc.*'
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image_name=ghcr.io/${owner_lc}/pococlass" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$ ]]; then
            channel="dev"
          elif [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            channel="rc"
          elif [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            channel="final"
          else
            echo "Invalid release tag: $tag"
            echo "Allowed: v<major>.<minor>.<patch>-dev.<n> | v<major>.<minor>.<patch>-rc.<n> | v<major>.<minor>.<patch>"
            exit 1
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          image_name="${{ steps.image.outputs.image_name }}"
          build_number="$(git rev-list --count HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          source_tag="${GITHUB_REF_NAME}"

          {
            echo "build_number=$build_number"
            echo "short_sha=$short_sha"
            echo "source_tag=$source_tag"
            echo "tags<<EOF"
            echo "${image_name}:${source_tag}"
            echo "${image_name}:build-${build_number}"
            echo "${image_name}:sha-${short_sha}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: distribution/docker-build/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_NUMBER=${{ steps.meta.outputs.build_number }}
            VERSION=${{ steps.meta.outputs.source_tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.source_tag }}
            org.opencontainers.image.title=PocoClass
            org.opencontainers.image.description=PocoClass Docker image

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Release image published"
            echo ""
            echo "- Channel: ${{ steps.validate.outputs.channel }}"
            echo "- Source tag: \`${{ steps.meta.outputs.source_tag }}\`"
            echo "- Build number: \`${{ steps.meta.outputs.build_number }}\`"
            echo "- Commit: \`${{ steps.meta.outputs.short_sha }}\`"
            echo ""
            echo "### Image tags"
            echo ""
            while IFS= read -r tag; do
              echo "- \`${tag}\`"
            done <<< "${{ steps.meta.outputs.tags }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update GitHub Release
        if: steps.validate.outputs.channel != 'dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.source_tag }}
          name: ${{ steps.meta.outputs.source_tag }}
          prerelease: ${{ steps.validate.outputs.channel == 'rc' }}
          generate_release_notes: true
          append_body: true
          body: |
            ## Container images

            - `${{ steps.image.outputs.image_name }}:${{ steps.meta.outputs.source_tag }}`
            - `${{ steps.image.outputs.image_name }}:build-${{ steps.meta.outputs.build_number }}`
            - `${{ steps.image.outputs.image_name }}:sha-${{ steps.meta.outputs.short_sha }}`

      - name: Fetch default branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.event.repository.default_branch }}"

      - name: Check README update eligibility
        id: readme_check
        shell: bash
        run: |
          set -euo pipefail
          default_branch="${{ github.event.repository.default_branch }}"
          if git merge-base --is-ancestor "${GITHUB_SHA}" "origin/${default_branch}"; then
            echo "update_readme=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_readme=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update README available versions
        if: steps.readme_check.outputs.update_readme == 'true'
        shell: bash
        run: |
          set -euo pipefail
          default_branch="${{ github.event.repository.default_branch }}"
          git switch "${default_branch}"
          python3 distribution/update_available_versions.py
          if git diff --quiet -- README.md; then
            echo "README already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update available versions"
          git push origin "HEAD:${default_branch}"
