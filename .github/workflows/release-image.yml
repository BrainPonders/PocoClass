name: Release Docker Image

on:
  push:
    tags:
      - '*.*-develop'
      - '*.*.*-rc.*'
      - '*.*.*'

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pococlass

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ ^[0-9]+\.[0-9]+-develop$ ]]; then
            channel="develop"
          elif [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            channel="rc"
          elif [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            channel="final"
          else
            echo "Invalid release tag: $tag"
            echo "Allowed: <major>.<minor>-develop | <major>.<minor>.<patch>-rc.<n> | <major>.<minor>.<patch>"
            exit 1
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          build_number="$(git rev-list --count HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          source_tag="${GITHUB_REF_NAME}"

          {
            echo "build_number=$build_number"
            echo "short_sha=$short_sha"
            echo "source_tag=$source_tag"
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${source_tag}"
            echo "${IMAGE_NAME}:build-${build_number}"
            echo "${IMAGE_NAME}:sha-${short_sha}"
            if [[ "${{ steps.validate.outputs.channel }}" == "develop" ]]; then
              echo "${IMAGE_NAME}:${source_tag}-build-${build_number}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          no-cache: true
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_NUMBER=${{ steps.meta.outputs.build_number }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.source_tag }}
            org.opencontainers.image.title=PocoClass
            org.opencontainers.image.description=PocoClass Docker image

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Release image published"
            echo ""
            echo "- Channel: ${{ steps.validate.outputs.channel }}"
            echo "- Source tag: \`${{ steps.meta.outputs.source_tag }}\`"
            echo "- Build number: \`${{ steps.meta.outputs.build_number }}\`"
            echo "- Commit: \`${{ steps.meta.outputs.short_sha }}\`"
            echo ""
            echo "### Image tags"
            echo ""
            while IFS= read -r tag; do
              echo "- \`${tag}\`"
            done <<< "${{ steps.meta.outputs.tags }}"
          } >> "$GITHUB_STEP_SUMMARY"
