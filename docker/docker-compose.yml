###############################################################################
#  PocoClass - Docker Compose Configuration
#
#  PREREQUISITES:
#    You must build the image first by running:  bash install.sh
#
#  QUICK START:
#    1. Run the install script:  bash install.sh
#    2. Edit this file to match your setup (see comments below)
#    3. Start PocoClass:  docker compose up -d
#    4. Open http://your-server:5000 in your browser
#
#  REQUIREMENTS:
#    - Your Paperless-ngx instance must be reachable from this container
#    - Both services must share the same Docker network
#
###############################################################################

services:
  pococlass:
    image: pococlass:latest
    container_name: pococlass
    restart: unless-stopped

    ports:
      # PocoClass web interface port
      # Change the left side if port 5000 is already in use on your host
      - "5000:5000"

    environment:
      # REQUIRED: Secret key for session encryption
      # The install script generates this automatically - do not change it
      # unless you want to invalidate all existing sessions
      - POCOCLASS_SECRET_KEY=${POCOCLASS_SECRET_KEY}

      # REQUIRED: Paperless-ngx URL as seen from inside the Docker network
      # This is NOT your browser URL - it is the internal Docker hostname
      # Common values:
      #   http://paperless-ngx:8000      (if container is named "paperless-ngx")
      #   http://paperless-webserver:8000 (if using the official compose setup)
      # Tip: run "docker ps" to find your Paperless container name
      - PAPERLESS_URL=${PAPERLESS_URL:-http://paperless-ngx:8000}

      # OPTIONAL: Performance tuning (defaults shown)
      # - GUNICORN_WORKERS=3        # Number of worker processes
      # - GUNICORN_THREADS=2        # Threads per worker
      # - GUNICORN_TIMEOUT=120      # Request timeout in seconds

    volumes:
      # Persistent data (database, settings)
      # Do not remove this volume or you will lose your configuration
      - pococlass-data:/app/data

      # Rule files - mount your local rules folder here
      # This lets you edit rules on the host without rebuilding the image
      # Change the left side to the path where your rule files are stored
      - ./rules:/app/rules

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      # IMPORTANT: This network must match your Paperless-ngx network
      # Run: docker network ls
      # to find the network name your Paperless container uses
      - paperless-network

volumes:
  pococlass-data:

networks:
  paperless-network:
    # Set to 'true' if the network already exists (created by Paperless)
    # Set to 'false' if you want Docker Compose to create it
    external: true
