###############################################################################
#  PocoClass - Docker Compose Configuration (HOST MODE)
#
#  DIFFERENCE VS BRIDGE MODE:
#    - Host mode shares the host network stack.
#    - You can use the same PAPERLESS_URL that you use in your browser UI,
#      e.g. https://paperless.example.com.
#    - Bridge mode requires PAPERLESS_URL to be a Docker-internal hostname,
#      e.g. http://paperless-webserver:8000 or http://paperless-ngx:8000.
#
#  QUICK START:
#    1) Copy this file to your deploy root as docker-compose.yml
#    2) Copy docker/compose/env.example to .env and review values
#    3) Set PAPERLESS_URL to your normal Paperless UI URL
#    4) Start PocoClass: docker compose up -d
#
#  NOTES:
#    - In host mode, "ports:" mappings are not used.
#    - PocoClass binds directly on host port 5000.
#
###############################################################################

services:
  pococlass:
    image: ${POCOCLASS_IMAGE:-pococlass:latest}
    container_name: pococlass
    restart: unless-stopped

    network_mode: host

    environment:
      # REQUIRED runtime secret (not used during image build)
      POCOCLASS_SECRET_KEY: ${POCOCLASS_SECRET_KEY:-}

      # REQUIRED: Paperless URL reachable from the host network.
      # In host mode this can be the same URL used in your browser.
      # Set PAPERLESS_URL in .env
      PAPERLESS_URL: ${PAPERLESS_URL:-}

      # OPTIONAL: Performance tuning
      # - GUNICORN_WORKERS=3
      # - GUNICORN_THREADS=2
      # - GUNICORN_TIMEOUT=120

    volumes:
      # Persistent data (database, settings)
      - ./data:/app/data

      # YAML rules directory
      - ./rules:/app/rules

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
