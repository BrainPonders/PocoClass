# eRJe 2026-03-09: PocoClass
# -----------------------------------------------------------------------------
# Docker Compose file for deploying PocoClass next to a Paperless-ngx Docker
# stack using bridge networking. PocoClass joins the same Docker network as
# Paperless and connects to the internal Paperless service URL.
#
# Docs:
# https://github.com/BrainPonders/PocoClass
#
# Notes (this deployment):
# - PAPERLESS_URL must be the Docker-internal Paperless URL.
# - Official Paperless defaults are provided in env.example.
# - 11notes Paperless presets are provided as commented values in env.example.
#
# -----------------------------------------------------------------------------
# History:
# 2026-03-09 | eRJe | Simplified public bridge deployment with shared env presets
# -----------------------------------------------------------------------------

services:
  pococlass:
    image: ${POCOCLASS_IMAGE:-ghcr.io/BrainPonders/pococlass:latest}
    container_name: pococlass
    restart: unless-stopped

    ports:
      # Change the host port if 5000 is already in use
      - "5000:5000"

    env_file:
      - .env

    volumes:
      # Persistent PocoClass data
      - ./data:/app/data

      # YAML rules created by the user
      - ./rules:/app/rules

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

    networks:
      - paperless

networks:
  paperless:
    # Network name comes from .env so the same compose can support official and 11notes
    name: ${PAPERLESS_NETWORK_NAME:-paperless_default}
    external: true
