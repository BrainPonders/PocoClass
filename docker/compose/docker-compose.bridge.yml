###############################################################################
#  PocoClass - Docker Compose Configuration (BRIDGE MODE)
#
#  DIFFERENCE VS HOST MODE:
#    - Bridge mode connects PocoClass to a Docker network.
#    - PAPERLESS_URL must be a Docker-internal hostname,
#      e.g. http://paperless-webserver:8000 or http://paperless-ngx:8000.
#    - Host mode allows using the same PAPERLESS_URL as your browser UI URL.
#
#  QUICK START:
#    1) Copy this file to your deploy root as docker-compose.yml
#    2) Copy docker/compose/env.example to .env and review values
#    3) Set PAPERLESS_URL to the Docker-internal Paperless hostname
#    4) Start PocoClass: docker compose up -d
#
#  NOTE:
#    PocoClass and Paperless-ngx must be on the same Docker network.
#
###############################################################################

services:
  pococlass:
    image: ${POCOCLASS_IMAGE:-pococlass:latest}
    container_name: pococlass
    restart: unless-stopped

    ports:
      # PocoClass web interface port (host:container)
      - "5000:5000"

    environment:
      # REQUIRED runtime secret (not used during image build)
      # Reads POCOCLASS_SECRET_KEY from .env or current shell environment
      POCOCLASS_SECRET_KEY: ${POCOCLASS_SECRET_KEY:-}

      # REQUIRED: Paperless URL from inside Docker network
      # Examples:
      #   - Official paperless-ngx compose: http://paperless-webserver:8000
      #   - 11notes paperless-ngx:          http://paperless-ngx:8000
      PAPERLESS_URL: ${PAPERLESS_URL:-http://paperless-webserver:8000}

      # OPTIONAL: Performance tuning
      # - GUNICORN_WORKERS=3
      # - GUNICORN_THREADS=2
      # - GUNICORN_TIMEOUT=120

    volumes:
      # Persistent data (database, settings)
      - ./data:/app/data

      # YAML rules directory
      - ./rules:/app/rules

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - paperless

networks:
  paperless:
    # Name of the existing Paperless network (set in .env)
    name: ${PAPERLESS_NETWORK_NAME:-paperless_default}

    # Keep true when the network is created by Paperless
    external: ${PAPERLESS_NETWORK_EXTERNAL:-true}
