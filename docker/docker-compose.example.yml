###############################################################################
#  PocoClass - Docker Compose Configuration
#
#  PREREQUISITES:
#    Run the installer first:
#      bash source/docker/install.sh
#
#  QUICK START:
#    1) Review .env (PAPERLESS_URL + PAPERLESS_NETWORK_NAME)
#    2) Start PocoClass: docker compose up -d
#    3) Open http://your-server:5000 in your browser
#
#  NOTE:
#    PocoClass and Paperless-ngx must be on the same Docker network.
#    The installer tries to auto-detect this and writes it to .env.
#
###############################################################################

services:
  pococlass:
    image: pococlass:latest
    container_name: pococlass
    restart: unless-stopped

    ports:
      # PocoClass web interface port (host:container)
      - "5000:5000"

    environment:
      # REQUIRED: Session encryption secret
      - POCOCLASS_SECRET_KEY=${POCOCLASS_SECRET_KEY}

      # REQUIRED: Paperless URL from inside Docker network
      # Examples:
      #   - Official paperless-ngx compose: http://paperless-webserver:8000
      #   - 11notes paperless-ngx:          http://paperless-ngx:8000
      - PAPERLESS_URL=${PAPERLESS_URL:-http://paperless-webserver:8000}

      # OPTIONAL: Performance tuning
      # - GUNICORN_WORKERS=3
      # - GUNICORN_THREADS=2
      # - GUNICORN_TIMEOUT=120

    volumes:
      # Persistent data (database, settings)
      - ./data:/app/data

      # YAML rules directory
      - ./rules:/app/rules

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - paperless

networks:
  paperless:
    # Name of the existing Paperless network (set in .env)
    name: ${PAPERLESS_NETWORK_NAME:-paperless_default}

    # Keep true when the network is created by Paperless
    external: ${PAPERLESS_NETWORK_EXTERNAL:-true}
